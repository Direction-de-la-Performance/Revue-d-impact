<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Revue d'impact — France Travail</title>
<link rel="stylesheet" href="css/ft-tokens.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<header class="ft-header">
  <div class="ft-header__inner">
    <img class="ft-header__logo" src="assets/logo-france-travail.svg" alt="France Travail">
    <div class="ft-header__title">
      <strong>Revue d'impact</strong>
      <span>Direction de la Performance — dialogue de performance ascendant</span>
    </div>
    <div class="ft-header__ctx" id="ctx-structure"></div>
  </div>
</header>

<nav class="steps" aria-label="Étapes de la revue d'impact">
  <div class="steps__inner">
    <button class="step" data-view="accueil">Accueil</button>
    <button class="step" data-view="diagnostic"><span class="step__num">1</span> Diagnostic</button>
    <button class="step" data-view="saisie"><span class="step__num">2</span> Remontée</button>
    <button class="step" data-view="consolidation"><span class="step__num">3</span> Consolidation</button>
  </div>
</nav>

<main id="app" aria-live="polite"></main>

<footer class="ft-footer">
  <div class="ft-footer__inner">
    <span>France Travail — Direction de la Performance</span>
    <span>Campagne des ambitions 2026 — données internes, diffusion restreinte</span>
  </div>
</footer>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
